name: OPL Cloud Whitepaper

on:
  push:
    branches: [main]
    paths:
      - docs/whitepapers/**
      - README.md
      - README.zh-CN.md
      - docs/README.md
      - docs/architecture.md
      - docs/roadmap.md
      - assets/branding/opl-cloud-overview-v2.png
      - contracts/whitepaper_profile.json
      - scripts/build-opl-cloud-whitepaper.ts
      - .github/workflows/whitepaper.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the approved build to GitHub Pages
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  whitepaper:
    uses: gaofeng21cn/one-person-lab/.github/workflows/reusable-whitepaper.yml@main
    with:
      profile: contracts/whitepaper_profile.json
      output_name: opl-cloud-whitepaper
      publish: ${{ github.event_name == 'workflow_dispatch' && inputs.publish }}
    secrets: inherit
