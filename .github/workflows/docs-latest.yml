name: OPL Cloud Latest Docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docs-latest.yml'
      - 'docs/whitepapers/**'
      - 'scripts/build-opl-cloud-whitepaper.ts'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-latest
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install document tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc poppler-utils texlive-xetex texlive-lang-chinese fonts-noto-cjk

      - name: Build latest docs
        run: node --experimental-strip-types scripts/build-opl-cloud-whitepaper.ts

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/site

      - name: Deploy Pages
        uses: actions/deploy-pages@v4
